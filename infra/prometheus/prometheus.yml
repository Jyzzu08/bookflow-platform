global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8080']

  - job_name: identity
    metrics_path: /health
    static_configs:
      - targets: ['identity:3001']

  - job_name: users-profile
    metrics_path: /health
    static_configs:
      - targets: ['users-profile:3002']

  - job_name: orders
    metrics_path: /health
    static_configs:
      - targets: ['orders:3003']

  - job_name: comments
    metrics_path: /health
    static_configs:
      - targets: ['comments:8001']

  - job_name: payments
    metrics_path: /health
    static_configs:
      - targets: ['payments-mock:8002']

  - job_name: notifications
    metrics_path: /health
    static_configs:
      - targets: ['notifications:3005']

  - job_name: search-index
    metrics_path: /health
    static_configs:
      - targets: ['search-index:3004']

  - job_name: catalog
    metrics_path: /health
    static_configs:
      - targets: ['catalog:80']
