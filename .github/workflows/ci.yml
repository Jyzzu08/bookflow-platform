name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  node-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, identity, users-profile, orders, search-index, notifications]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package.json
      - run: npm install
      - run: npm run lint
      - run: npm test
        env:
          SKIP_EXTERNAL_INIT: '1'

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [comments, payments-mock]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py

  catalog-laravel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog-laravel
    steps:
      - uses: actions/checkout@v6
      - name: Run Laravel tests in PHP 8.4 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/services/catalog-laravel \
            php:8.4-cli-bookworm@sha256:e098af62ecd043f652a3bb143e917d4af6dacd98f1f05c0bb77811998d0c1c3d \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends curl git unzip libonig-dev libsqlite3-dev
              rm -rf /var/lib/apt/lists/*
              docker-php-ext-install mbstring pdo_sqlite sqlite3
              pecl install pcov
              docker-php-ext-enable pcov
              curl -fsSL https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
              cp .env.example .env
              composer install --no-interaction --prefer-dist
              php artisan test --coverage-clover coverage.xml
            '
      - uses: actions/upload-artifact@v7
        with:
          name: catalog-laravel-coverage
          path: services/catalog-laravel/coverage.xml

  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare environment
        run: cp .env.example .env
      - run: docker compose config

  integration-platform:
    runs-on: ubuntu-latest
    needs: [docker-compose-validate]
    steps:
      - uses: actions/checkout@v6
      - name: Prepare environment
        run: cp .env.example .env
      - name: Start platform
        run: docker compose up --build -d
      - name: Wait for health
        run: sleep 45
      - name: Smoke validation
        shell: pwsh
        run: ./scripts/smoke.ps1
      - name: Contract validation
        shell: pwsh
        run: ./scripts/contract-test.ps1
      - name: End-to-end validation
        shell: pwsh
        run: ./scripts/e2e-test.ps1
      - name: Shutdown
        if: always()
        run: docker compose down -v

  security-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path: [services/gateway, services/identity, services/users-profile, services/orders, services/search-index, services/notifications, apps/web]
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - run: npm audit --audit-level=high || true

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate SBOM
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            anchore/syft@sha256:15952b4306fd990724afaaf7f1c71fcd03546b89fbf6f2d32b0be5f81e3ef431 \
            scan dir:/src -q -o spdx-json=/src/sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
